<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Brand tile (components.css .sb-brand-tile): g-400→g-600 gradient, rounded,
       with the review header's ⟲ glyph drawn as a stroke path (ds icon style). -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4ade80"/>
      <stop offset="1" stop-color="#16a34a"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#g)"/>
  <g transform="translate(6 6) scale(0.8333)" fill="none" stroke="#03190c" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="1 4 1 10 7 10"/>
