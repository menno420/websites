name: host-automerge-extras

# HOST-OWNED companion to the kit-owned auto-merge-enabler.yml.
#
# Provenance: these two jobs (arm-on-open + sweep) were host additions living
# inside .github/workflows/auto-merge-enabler.yml until the substrate-kit
# v1.15.0 upgrade regenerated that file as kit-owned (hand edits there are
# overwritten on every upgrade). The upgrade banked the full pre-regen file at
# .substrate/backup/auto-merge-enabler.pre-regen-c43c1c30.yml and instructed
# moving host additions into a separate workflow — this file is that move,
# jobs carried verbatim from the bank.
#
# What this file preserves that the kit-owned enabler does not:
#   * the SWEEP job (schedule + manual dispatch): arms every currently-open
#     eligible claude/* PR, with a direct-squash fallback for already-clean
#     PRs (GitHub rejects arming a PR with nothing left to wait on);
#   * the workflow-touching-PR rail: any PR whose diff touches
#     .github/workflows/** is PARKED — labeled `do-not-automerge` and
#     disarmed — so workflow PRs stay owner-merge-only (the owner removes
#     the label and merges by hand to land one).
#
# RECONCILED (2026-07-14; audit 2026-07-13 finding 4): the kit-owned enabler
# arms on the same pull_request events and carries no workflow rail, so the
# two files used to race on workflow-touching PRs — PR #321 observed
# arm/disarm churn with the kit's arm landing LAST (its 15 s label-grace
# sleep runs after this rail's disarm). The rail now speaks the kit's own
# carve-out protocol instead of fighting its arm: it applies the
# `do-not-automerge` label FIRST — the kit enabler job-skips labeled PRs on
# every future event, and its fresh pre-arm label re-read refuses to arm on
# the current event — then disarms, then re-checks once after the kit's arm
# window to catch the one interleaving where the kit's re-read predates the
# label. Deterministic final state: parked, never armed, no ping-pong.
#
# Original rails retained: only non-draft claude/* head branches; GITHUB_TOKEN
# only; permissions limited to contents + pull-requests + issues write
# (issues: write added for the repo-level ensure-create of the
# `do-not-automerge` label).

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  schedule:
    - cron: "13,43 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: host-automerge-extras-${{ github.event.pull_request.number || github.event_name }}
  cancel-in-progress: false

jobs:
  arm-on-open:
    if: >-
      github.repository == 'menno420/websites' &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      startsWith(github.head_ref, 'claude/')
    runs-on: ubuntu-latest
    steps:
      - name: Arm native squash auto-merge (park workflow-touching PRs)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          files="$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR/files" --paginate --jq '.[].filename')"
          if printf '%s\n' "$files" | grep -q '^\.github/workflows/'; then
            echo "PR #$PR touches .github/workflows/** — owner-merge-only; parking."
            # (1) Label FIRST. `do-not-automerge` is the kit enabler's own
            # documented carve-out: its job-level `if` skips labeled PRs on
            # every future pull_request event, and its pre-arm fresh label
            # re-read (15 s grace + API re-read) refuses to arm when the
            # label is present NOW. Ensure the repo label exists (the call
            # 422s harmlessly once it does), then apply it to the PR.
            gh api "repos/$GITHUB_REPOSITORY/labels" \
              -f name='do-not-automerge' -f color='b60205' \
              -f description='parked: owner-merge-only (workflow-touching PR rail)' \
              >/dev/null 2>&1 || true
            label_ok=1
            gh api "repos/$GITHUB_REPOSITORY/issues/$PR/labels" \
              -f 'labels[]=do-not-automerge' >/dev/null || label_ok=0
            echo "do-not-automerge label applied: $([ "$label_ok" = "1" ] && echo yes || echo FAILED)"
            # (2) Disarm anything already armed.
            gh pr merge --disable-auto "$PR" --repo "$GITHUB_REPOSITORY" 2>/dev/null \
              || echo "auto-merge was not armed on PR #$PR (nothing to disarm)."
            # (3) Settle. A kit-enabler run for THIS SAME event may have
            # passed its label re-read before (1) and armed moments later —
            # an arm follows its re-read within seconds (one gh call), so
            # outwait that window once, then disarm any straggler arm. A
            # labeled PR can never be re-armed by a later event (the kit
            # job-skips it), so this is the last possible flip: the final
            # state is deterministically PARKED.
            sleep 75
            if [ "$(gh pr view "$PR" --repo "$GITHUB_REPOSITORY" \
                    --json autoMergeRequest --jq '.autoMergeRequest != null')" = "true" ]; then
              echo "kit enabler armed inside the race window — final disarm."
              gh pr merge --disable-auto "$PR" --repo "$GITHUB_REPOSITORY"
            else
              echo "settled: PR #$PR is parked (not armed)."
            fi
            if [ "$label_ok" = "0" ]; then
              echo "::error::could not apply do-not-automerge to PR #$PR — the park is not durable (the kit enabler re-arms on the next push). Failing loudly."
              exit 1
            fi
            exit 0
          fi
          if gh pr merge --auto --squash "$PR" --repo "$GITHUB_REPOSITORY"; then
            echo "Auto-merge (squash) armed for PR #$PR — it merges when the required 'quality' check is green."
          elif gh pr merge --squash "$PR" --repo "$GITHUB_REPOSITORY"; then
            # Arming fails on a PR that is already clean (nothing to wait on);
            # a direct merge only succeeds if the ruleset's required check is
            # already green — GitHub gates it, not this script.
            echo "PR #$PR was already clean — squash-merged directly."
          else
            echo "::warning::Could not arm or merge PR #$PR. Confirm 'Allow auto-merge' is ON and main requires the 'quality' check."
          fi

  sweep:
    if: >-
      github.repository == 'menno420/websites' &&
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - name: Arm auto-merge on every open eligible claude/* PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          prs="$(gh pr list --repo "$GITHUB_REPOSITORY" --state open --limit 100 \
                 --json number,isDraft,headRefName,autoMergeRequest \
                 --jq '.[] | select(.isDraft == false)
                           | select(.headRefName | startswith("claude/"))
                           | select(.autoMergeRequest == null)
                           | .number')"
          if [ -z "$prs" ]; then
            echo "No open non-draft claude/* PRs without auto-merge — nothing to do."
            exit 0
          fi
          for pr in $prs; do
            files="$(gh api "repos/$GITHUB_REPOSITORY/pulls/$pr/files" --paginate --jq '.[].filename')"
            if printf '%s\n' "$files" | grep -q '^\.github/workflows/'; then
              echo "PR #$pr touches .github/workflows/** — owner-merge-only; skipped."
              continue
            fi
            if gh pr merge --auto --squash "$pr" --repo "$GITHUB_REPOSITORY"; then
              echo "Auto-merge (squash) armed for PR #$pr."
            elif gh pr merge --squash "$pr" --repo "$GITHUB_REPOSITORY"; then
              echo "PR #$pr was already clean — squash-merged directly."
            else
              echo "::warning::Could not arm or merge PR #$pr — left untouched."
            fi
          done
