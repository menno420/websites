name: review-bake

# Scheduled data bake for the fleet's committed data mirrors — keeps the
# sites fresh without any runtime network access:
#   review/data/snapshot.json    (this repo's own history — gen_snapshot.py)
#   review/data/fleet.json       (fleet registry + heartbeat mirror — gen_fleet.py)
#   review/data/stats.json       (per-repo REST numbers — gen_stats.py, which
#                                 uses the Actions GITHUB_TOKEN for rate headroom;
#                                 a durable owner PAT would unlock richer stats —
#                                 queued in docs/owner/OWNER-ACTIONS.md)
#   review/data/questions.json   (/questions ledger intake — gen_questions.py;
#                                 one capped issues call, merges issues titled
#                                 [program-review] into the committed ledger,
#                                 hand-written answer links preserved; fail-soft:
#                                 any fetch failure keeps the committed file and
#                                 exits 0)
#   botsite/data/graveyard.json  (trading-strategy experiment-ledger aggregate —
#                                 botsite/gen_graveyard.py; anonymous raw fetch +
#                                 ls-remote, fail-soft: on any fetch failure it
#                                 keeps the committed file and exits 0)
#
# Trigger: daily cron (best-effort delivery, ±hours — the capability ledger's
# standing finding; never gate anything on a slot) + workflow_dispatch for a
# manual refresh. NOT triggered by push — no self-trigger loop is possible.
#
# Landing path for the baked diff (touches ONLY review/data/** +
# botsite/data/graveyard.json — the explicitly staged data files):
#   1. try a direct push to main — if the branch ruleset allows it, done;
#   2. otherwise push a `bake/…` branch and try to open a `[bake]` PR with
#      auto-merge, so the required `quality` check still gates the diff (a
#      data-only PR adds no session card — the quality workflow's no-card
#      path is explicitly advisory for exactly this kind of diff — and the
#      full test suite runs against the regenerated data, which the review
#      tests treat shape-wise, not value-wise);
#   3. if PR creation is refused, the job DOES NOT FAIL: the baked branch is
#      already pushed, and the run summary says exactly what to do with it.
#
# ⚑ KNOWN WALL — RESOLVED 2026-07-12 (docs/owner/OWNER-ACTIONS.md Decided
#   row M): early runs failed at `gh pr create` with "GitHub Actions is not
#   permitted to create or approve pull requests" until the owner flipped
#   Settings → Actions → General → "Allow GitHub Actions to create and
#   approve pull requests". The refusal handling below is KEPT as
#   defense-in-depth — if the toggle ever reverts, the workflow degrades
#   honestly again: the bake data lands on a pushed `bake/…` branch, the
#   job stays green (exit 0), and the summary carries a compare link so any
#   session (or the owner) can open the PR. No new secrets either way.
#
# Required-check chain (added 2026-07-13; measured reality same day): a PR
#   created with the Actions GITHUB_TOKEN does not trigger its own
#   `pull_request` workflows (GitHub's recursion guard — verified on PR #259:
#   zero check runs on its head; a session had to close/reopen it by hand).
#   After opening the PR this job dispatches `quality.yml` on the bake branch
#   (`gh workflow run`, needs `actions: write`) — the dispatch run's check
#   lands green on the PR head SHA. ⚑ MEASURED LIMIT (PR #270, quality run
#   29242891214 on head 48cef208): the ruleset does NOT accept that
#   dispatch-event run as the required `quality` context — merge attempts
#   return verbatim `405 Repository rule violations found` / `Required
#   status check "quality" is expected.`, and armed auto-merge never fires.
#   The chain is KEPT as a visible green signal (zero cost, proves the diff
#   passes), not as the merge unlock. Interim landing path: a session (any
#   non-GITHUB_TOKEN actor) closes/reopens the bake PR — that fires a REAL
#   pull_request quality run the ruleset accepts (precedent PR #259) — or
#   review-merges it. Durable fix: create the bake PR with a fine-grained
#   PAT instead of GITHUB_TOKEN — see the ⚑ OWNER-ACTION row (2026-07-13)
#   in docs/owner/OWNER-ACTIONS.md.
#   Best-effort like the PR create: a refused dispatch never fails the job.
#
# Scope safety: the commit path stages the baked data files explicitly (never
# `git add -A`), the job has no secret beyond the repo-scoped Actions token,
# and a bake that produces no diff exits quietly.

on:
  schedule:
    - cron: "23 5 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  # actions:write ONLY for `gh workflow run quality.yml` — the dispatch-chained
  # required check on the bake PR (see the header). Nothing broader.
  actions: write

jobs:
  bake:
    if: github.repository == 'menno420/websites'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history: gen_snapshot.py derives per-day numbers from git log.
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # The generators are stdlib-only on purpose (urllib, ast, json) — no
      # dependency install needed for the bake itself. gen_graveyard.py is
      # path-independent (writes next to its own file) and fail-soft: if the
      # anonymous raw.githubusercontent.com fetch fails it keeps the
      # committed graveyard.json untouched and exits 0.
      - name: Bake snapshot + fleet mirror + stats + botsite graveyard
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 review/gen_snapshot.py
          python3 review/gen_fleet.py
          python3 review/gen_stats.py
          python3 review/gen_questions.py
          python3 botsite/gen_graveyard.py

      - name: Commit and land the refreshed data
        env:
          GH_TOKEN: ${{ secrets.BAKE_PAT || secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "review-bake[bot]"
          git config user.email "review-bake@users.noreply.github.com"
          # Stage ONLY the baked data files — never a blanket add.
          git add review/data/snapshot.json review/data/fleet.json
          git add review/data/stats.json 2>/dev/null || true
          git add review/data/questions.json 2>/dev/null || true
          git add botsite/data/graveyard.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "bake produced no changes — nothing to land."
            exit 0
          fi
          stamp="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git commit -m "[bake] fleet data refresh $stamp" \
                     -m "Scheduled review-bake: regenerated committed data mirrors (review/data snapshot, fleet, stats; botsite/data graveyard). Data-only diff; no session card by design (see .github/workflows/review-bake.yml)."
          if git push origin HEAD:main; then
            echo "pushed directly to main."
            exit 0
          fi
          echo "direct push rejected (ruleset) — landing via PR + auto-merge."
          branch="bake/review-data-$(date -u +%Y%m%d-%H%M%S)"
          git checkout -b "$branch"
          git push -u origin "$branch"
          echo "pushed $branch — the baked data is safe on the remote regardless of what follows."
          # PR creation is BEST-EFFORT: it is refused until the owner enables
          # "Allow GitHub Actions to create and approve pull requests"
          # (see the header). A refusal must not fail the job — the bake
          # itself succeeded and the branch is pushed.
          if pr_url="$(gh pr create \
            --title "[bake] fleet data refresh $stamp" \
            --body "Automated daily bake of the committed data mirrors (review/data/snapshot.json, fleet.json, stats.json; botsite/data/graveyard.json). Data-only diff — no session card by design. Auto-merge is enabled and a quality run is dispatched on this branch (PRs created with the Actions token don't trigger their own pull_request checks); if either could not be armed, this PR waits for a human hand." \
            --base main --head "$branch" 2>&1)"; then
            echo "opened $pr_url"
            {
              echo "## review-bake: PR opened"
              echo "Baked data refreshed and PR opened: $pr_url"
            } >> "$GITHUB_STEP_SUMMARY"
            gh pr merge --squash --auto "$pr_url" \
              || echo "auto-merge could not be enabled — PR left open for a human click (visible on the board)."
            # Required-check chain (see header): the GITHUB_TOKEN-created PR
            # triggers no pull_request run of its own, so dispatch quality.yml
            # on the bake branch — its check run lands on the PR head SHA and
            # satisfies the required `quality` context. Best-effort: a refused
            # dispatch never fails the job, it just leaves the PR checkless
            # (fallback: dispatch quality.yml on $branch by hand, or
            # close/reopen the PR).
            if gh workflow run quality.yml --ref "$branch"; then
              echo "dispatched quality.yml on $branch (required-check chain)."
              echo "Dispatched \`quality.yml\` on \`$branch\` to satisfy the required check." >> "$GITHUB_STEP_SUMMARY"
            else
              echo "quality dispatch refused — PR is checkless until a hand dispatches quality.yml on $branch or closes/reopens it."
              echo "⚠ quality dispatch refused — PR needs a hand: dispatch \`quality.yml\` on \`$branch\`, or close/reopen the PR." >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "PR creation refused: $pr_url"
            {
              echo "## review-bake: baked branch pushed, PR creation refused"
              echo ""
              echo "The bake succeeded and its data is on branch \`$branch\`, but"
              echo "\`gh pr create\` was refused (verbatim): \`$pr_url\`"
              echo ""
              echo "**Owner fix (one console toggle):** Settings → Actions → General →"
              echo "Workflow permissions → check *Allow GitHub Actions to create and approve pull requests*."
              echo ""
              echo "**Until then:** open the PR from the pushed branch —"
              echo "https://github.com/${GITHUB_REPOSITORY}/compare/main...$branch?expand=1"
            } >> "$GITHUB_STEP_SUMMARY"
            # exit 0 on purpose: the bake worked; only the landing needs a hand.
            exit 0
          fi
