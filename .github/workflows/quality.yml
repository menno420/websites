name: quality

# Substrate-kit quality gate for the websites repo.
# Runs the kit doc/session-log hygiene checker plus every service's pytest
# suite. Gates every PR into main and every push to main (merge = deploy, so
# main must always be green).

on:
  pull_request:
  push:
    branches: [main]
  # Dispatch-chained required check for bake PRs (review-bake.yml): a PR
  # created with the Actions GITHUB_TOKEN triggers no pull_request run of
  # its own (GitHub's recursion guard), but workflow_dispatch events created
  # WITH that token are the documented exception — review-bake dispatches
  # this workflow on its bake branch, and the resulting `quality` check run
  # lands on the branch head SHA (= the PR head SHA), which is how required
  # status checks match (by check-run name on the SHA, not by event). The
  # diff-range steps below derive their range from the merge base with
  # origin/main when no event range exists.
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the session-gate step can diff PR/push ranges.
          fetch-depth: 0

      # Control fast lane (kit v1.2.0, KL-8): a diff touching ONLY control/**
      # (a status heartbeat, an inbox append) short-circuits this job GREEN
      # in-job. Deliberately NOT a paths-ignore: `quality` is a REQUIRED
      # check, and a required context that never reports stays pending
      # forever and jams the merge (the fleet-protocol heartbeat-lane
      # lesson, 2026-07-09). Coordination writes skip the heavy suite and
      # need no session card; empty/unreadable diffs fail safe onto the
      # full suite. Mirrors the kit's staged .substrate/ci/substrate-gate.yml
      # control lane, folded into this single enforced gate on purpose.
      - name: control fast lane (control/**-only diff short-circuits green)
        id: lane
        run: |
          if [ -n "${{ github.base_ref }}" ]; then
            range="origin/${{ github.base_ref }}...HEAD"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # No event diff range exists on a dispatch — grade the branch's
            # own diff vs its merge base with main (the bake-PR chain).
            range="$(git merge-base origin/main HEAD)..HEAD"
          else
            range="${{ github.event.before }}..${{ github.sha }}"
          fi
          files="$(git diff --name-only "$range" 2>/dev/null || true)"
          control_only=false
          if [ -n "$files" ] && [ -z "$(printf '%s\n' "$files" | grep -v '^control/')" ]; then
            control_only=true
          fi
          # Fast-lane grammar-pin selection (gate (c) below): a control-only
          # diff that touches the outbox, the heartbeat, or a claim file
          # still runs the ONE pytest pin file guarding that file's grammar
          # (or, for claims, its drift state). Empty when the fast lane is
          # off (full lane runs the whole suite anyway) or when none of
          # those files is in the diff — the plain fast path is unchanged.
          pin_tests=""
          if [ "$control_only" = "true" ]; then
            if printf '%s\n' "$files" | grep -Fxq 'control/outbox.md'; then
              pin_tests="tests/test_outbox_grammar_pin.py"
            fi
            if printf '%s\n' "$files" | grep -Fxq 'control/status.md'; then
              pin_tests="${pin_tests:+$pin_tests }tests/test_own_heartbeat.py"
            fi
            if printf '%s\n' "$files" | grep -q '^control/claims/'; then
              pin_tests="${pin_tests:+$pin_tests }tests/test_claims_drift_gate.py"
            fi
          fi
          echo "control_only=$control_only" >> "$GITHUB_OUTPUT"
          echo "pin_tests=$pin_tests" >> "$GITHUB_OUTPUT"
          echo "control-only diff: $control_only"
          echo "fast-lane grammar pin tests: ${pin_tests:-<none>}"

      # Fast-lane control gates (kit staged-gate port #2, 2026-07-11 — the
      # #120 every-card port covered the session-card lanes; these cover the
      # CONTROL lanes the fast lane used to skip entirely):
      #
      # (a) control-status gate — a control-only PR edits exactly the files
      #     the status checker validates; without this a heartbeat-deleting
      #     or heartbeat-breaking control PR merges GREEN and pre-reddens
      #     the NEXT unrelated PR (kit fleet review 2026-07-09). Scoped +
      #     stdlib-only on the system python3 (no setup-python): the lane
      #     stays fast and heartbeat PRs still need no session card.
      - name: control-status gate (fast lane — a control diff must still prove its heartbeat)
        if: steps.lane.outputs.control_only == 'true'
        run: python3 bootstrap.py check --strict --status-only

      # (b) inbox append-only gate — control/inbox.md is one-writer /
      #     append-only by protocol (control/README.md): without this a
      #     green control-only PR could rewrite or erase orders. Holds the
      #     PR red unless the inbox diff is PURE-APPEND vs the merge-base
      #     and the appended text is well-formed ORDER blocks. Runs on BOTH
      #     lanes (no lane condition): an inbox append rides the fast lane,
      #     but a mixed PR could smuggle an inbox edit through the full
      #     lane too. Stdlib-only system python3; git extracts the base
      #     blob here in bash because the engine never shells out.
      #     Self-skips when control/inbox.md is untouched.
      - name: inbox append-only gate (control/inbox.md pure-append + ORDER grammar)
        run: |
          if [ -n "${{ github.base_ref }}" ]; then
            base="$(git merge-base "origin/${{ github.base_ref }}" HEAD)"
            range="origin/${{ github.base_ref }}...HEAD"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            base="$(git merge-base origin/main HEAD)"
            range="$base..HEAD"
          else
            base="${{ github.event.before }}"
            range="${{ github.event.before }}..${{ github.sha }}"
          fi
          changed="$(git diff --name-only "$range" 2>/dev/null | grep -Fx 'control/inbox.md' || true)"
          if [ -z "$changed" ]; then
            echo "control/inbox.md not in diff — inbox append-only gate skipped."
          else
            basefile="$(mktemp)"
            git show "$base:control/inbox.md" > "$basefile" 2>/dev/null || : > "$basefile"
            python3 bootstrap.py check --strict --status-only --inbox-base "$basefile"
          fi

      # (c) grammar pins gate — the fast lane skips pytest by design, but
      #     control/outbox.md and control/status.md are machine-read by the
      #     app (briefing REPORTS card, /fleet heartbeat parsers) and each
      #     already has a committed-file pytest pin
      #     (tests/test_outbox_grammar_pin.py from PR #289,
      #     tests/test_own_heartbeat.py). Without this, the pin fires only
      #     on the NEXT non-control PR — a typo'd outbox REPORT heading
      #     merged green and rendered /owner/briefing honest-empty for a
      #     morning, and incident PR #307 merged a heartbeat the fast lane
      #     never parse-checked. When (and only when) a control-only diff
      #     touches one of those two files, run exactly that file's pin.
      #     The pins import app.briefing / app.fleet (→ httpx), so this
      #     needs real deps — set up the same Python 3.12 as the full lane
      #     but install only pytest + httpx, keeping the lane fast. A
      #     third pin (claims-drift, audit 2026-07-13 suggestion 2) fires
      #     when the diff touches control/claims/**: a claim landing or
      #     being released on the fast lane must not reference a branch
      #     that already merged into main (orphaned claim) —
      #     tests/test_claims_drift_gate.py grades terminality with pure
      #     git plumbing against the fetch-depth-0 checkout, no network.
      #     A control-only diff touching NONE of those files (an inbox
      #     append) skips these steps: today's fast path, unchanged.
      - name: Set up Python 3.12 (fast lane — grammar pins only)
        if: steps.lane.outputs.control_only == 'true' && steps.lane.outputs.pin_tests != ''
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: control grammar pins (fast lane — outbox REPORT / status heartbeat)
        if: steps.lane.outputs.control_only == 'true' && steps.lane.outputs.pin_tests != ''
        run: |
          python3 -m pip install --quiet pytest httpx
          python3 -m pytest ${{ steps.lane.outputs.pin_tests }} -q

      - name: Set up Python 3.12
        if: steps.lane.outputs.control_only != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install app dependencies
        if: steps.lane.outputs.control_only != 'true'
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install \
            -r requirements.txt \
            -r botsite/requirements.txt \
            -r dashboard/requirements.txt \
            -r review/requirements.txt \
            pytest

      # Kit gate: docs hygiene (badges / links / reachability), session-log
      # markers, namespace shadowing, seam authority, orientation budget, and
      # the decision ledger — gated on EVERY session card this PR/push
      # touches, never a single picked one (kit v1.10.1 every-card gate,
      # ported 2026-07-11 from the staged .substrate/ci/substrate-gate.yml
      # into this single enforced lane; the old `tail -1` picker graded only
      # the last-sorting card, so a PR that ADDED a born-red card and
      # MODIFIED a later-sorting sibling shipped the in-progress card GREEN
      # — the multi-card shadowing loophole).
      #
      # Lanes, mirroring the staged gate exactly (gate file path adapted to
      # this folded workflow):
      #  * cards ADDED by the PR (born-red at birth is the REQUIRED state):
      #    absent sentinel + --added-card per card — the engine grades each
      #    card by what it DECLARES: in-progress/drafted = the designed
      #    born-red HOLD (red until the card flips complete), grammar misses
      #    red, complete passes; any added card holding holds the step.
      #    Modified sibling cards in the same diff are ADVISORY-ONLY
      #    (logged, never grade-affecting) — a sibling backfill can no
      #    longer shadow the added card.
      #  * diff that ONLY MODIFIES cards (every close-out flips one): the
      #    full locked-door gate on EACH modified card, so a close-out that
      #    forgot to flip `complete` still reds.
      #  * no card in the diff: an explicitly named, NONEXISTENT sentinel
      #    WITHOUT --require-session-log — per the engine's contract an
      #    explicit absent card is ADVISORY, while the bare mtime fallback
      #    would latch onto a mid-session in-progress card and red every
      #    unrelated PR (CI flattens mtimes; the omitted argument was never
      #    fail-open in CI).
      #  * a PR that also touches THIS workflow file (gate regen/change):
      #    every ADDED card keeps the FULL locked door + --simulate-added-card
      #    — hold semantics may only tighten, never loosen, inside the PR
      #    that changes them.
      - name: substrate check (strict, every-card diff-aware session gate)
        if: steps.lane.outputs.control_only != 'true'
        run: |
          if [ -n "${{ github.base_ref }}" ]; then
            range="origin/${{ github.base_ref }}...HEAD"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            range="$(git merge-base origin/main HEAD)..HEAD"
          else
            range="${{ github.event.before }}..${{ github.sha }}"
          fi
          cards="$(git diff --name-only --diff-filter=d "$range" -- '.sessions/*.md' ':!.sessions/README.md' 2>/dev/null)"
          added="$(git diff --name-only --diff-filter=A "$range" -- '.sessions/*.md' ':!.sessions/README.md' 2>/dev/null)"
          gate_regen="$(git diff --name-only "$range" -- '.github/workflows/quality.yml' 2>/dev/null | tail -1)"
          echo "session gate cards: ${cards:-<none - advisory sentinel>}"
          fail=0
          if [ -n "$added" ]; then
            while IFS= read -r card; do
              [ -z "$card" ] && continue
              if printf '%s\n' "$added" | grep -Fxq -- "$card"; then continue; fi
              echo "modified sibling card (advisory — logged, never grade-affecting): $card"
            done <<< "$cards"
            while IFS= read -r card; do
              [ -z "$card" ] && continue
              if [ -n "$gate_regen" ]; then
                echo "card $card is ADDED but this PR also touches the gate workflow itself — locked-door gate (mid-PR semantics may only tighten; flip the card complete to merge)"
                python3 bootstrap.py check --strict --require-session-log --session-log "$card" --simulate-added-card "$card" || fail=1
              else
                echo "card $card is newly ADDED by this PR (born-red heartbeat) — added-card gate: in-progress HOLDs until the card flips complete; grammar misses red"
                python3 bootstrap.py check --strict --session-log .sessions/__born-red-card-added__.md --added-card "$card" || fail=1
              fi
            done <<< "$added"
          elif [ -n "$cards" ]; then
            while IFS= read -r card; do
              [ -z "$card" ] && continue
              echo "card $card is MODIFIED by this PR (close-out flip) — locked-door gate"
              python3 bootstrap.py check --strict --require-session-log --session-log "$card" || fail=1
            done <<< "$cards"
          else
            python3 bootstrap.py check --strict --session-log .sessions/__no-card-in-diff__.md
          fi
          exit "$fail"

      # Enforcing guard: no tracked code may read the ambient production-bot
      # Railway IDs (RAILWAY_PROJECT_ID / SERVICE_ID / ENVIRONMENT_ID), and a
      # safety doc must carry the warning. See docs/RAILWAY-SAFETY.md.
      - name: no ambient production Railway IDs
        if: steps.lane.outputs.control_only != 'true'
        run: python3 scripts/check_no_ambient_railway_ids.py

      # Every service's test suite. FastAPI apps in app/, botsite/, dashboard/, review/.
      - name: pytest (all services)
        if: steps.lane.outputs.control_only != 'true'
        run: python3 -m pytest tests/ botsite/tests dashboard/tests review/tests -q
