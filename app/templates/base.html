<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}control plane{% endblock %}</title>
<style>
:root { --bg:#0d1117; --panel:#161b22; --border:#30363d; --fg:#e6edf3; --dim:#8b949e;
        --green:#3fb950; --red:#f85149; --amber:#d29922; --blue:#58a6ff; --purple:#bc8cff; }
* { box-sizing:border-box; }
body { margin:0; background:var(--bg); color:var(--fg);
       font:14px/1.5 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
a { color:var(--blue); text-decoration:none; } a:hover { text-decoration:underline; }
header { display:flex; gap:1.2rem; align-items:baseline; padding:.8rem 1.2rem;
         border-bottom:1px solid var(--border); background:var(--panel);
         position:sticky; top:0; flex-wrap:wrap; }
header .brand { font-weight:700; color:var(--fg); }
header nav a { color:var(--dim); margin-right:.9rem; }
header nav a.on { color:var(--fg); border-bottom:2px solid var(--blue); }
header .right { margin-left:auto; color:var(--dim); font-size:12px; }
main { padding:1.2rem; max-width:1200px; margin:0 auto; }
.card { background:var(--panel); border:1px solid var(--border); border-radius:8px;
        padding:1rem 1.2rem; margin-bottom:1.2rem; overflow-x:auto; }
.card h2 { margin:.1rem 0 .6rem; font-size:16px; }
.card h3 { margin:.9rem 0 .35rem; font-size:13px; color:var(--dim);
           text-transform:uppercase; letter-spacing:.05em; }
table { border-collapse:collapse; width:100%; }
th,td { text-align:left; padding:.28rem .6rem .28rem 0; vertical-align:top; }
th { color:var(--dim); font-weight:600; font-size:12px; }
tr + tr td { border-top:1px solid #21262d; }
.b { display:inline-block; padding:.05rem .5rem; border-radius:999px; font-size:12px;
     border:1px solid var(--border); white-space:nowrap; }
.b.ok      { color:var(--green); border-color:var(--green); }
.b.bad     { color:var(--red);   border-color:var(--red); }
.b.warn    { color:var(--amber); border-color:var(--amber); }
.b.unknown { color:var(--dim); }
.b.design  { color:var(--purple); border-color:var(--purple); }
.dim { color:var(--dim); } .small { font-size:12px; }
.note { color:var(--purple); font-size:12px; }
.md { font:15px/1.6 system-ui,-apple-system,Segoe UI,sans-serif; max-width:900px; }
.md pre { background:var(--bg); border:1px solid var(--border); border-radius:6px;
          padding:.7rem; overflow-x:auto; font-size:13px; }
.md code { background:var(--bg); padding:.1rem .3rem; border-radius:4px; font-size:13px; }
.md h1,.md h2 { border-bottom:1px solid var(--border); padding-bottom:.25rem; }
.md blockquote { border-left:3px solid var(--border); margin-left:0;
                 padding-left:1rem; color:var(--dim); }
.md table td,.md table th { border:1px solid var(--border); padding:.3rem .6rem; }
.refresh { float:right; font-size:12px; }
</style>
</head>
<body>
<header>
  <span class="brand">superbot control plane</span>
  <nav>
    <a href="/" class="{{ 'on' if active == 'board' else '' }}">readiness board</a>
    <a href="/journal" class="{{ 'on' if active == 'journal' else '' }}">journal browser</a>
  </nav>
  <span class="right">{% block headright %}{% endblock %}</span>
</header>
<main>{% block content %}{% endblock %}</main>
</body>
</html>
