<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}control plane{% endblock %}</title>
<style>
:root { --bg:#0d1117; --panel:#161b22; --border:#30363d; --fg:#e6edf3; --dim:#8b949e;
        --green:#3fb950; --red:#f85149; --amber:#d29922; --blue:#58a6ff; --purple:#bc8cff; }
* { box-sizing:border-box; }
body { margin:0; background:var(--bg); color:var(--fg);
       font:14px/1.5 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
a { color:var(--blue); text-decoration:none; } a:hover { text-decoration:underline; }
header { display:flex; gap:1.2rem; align-items:baseline; padding:.8rem 1.2rem;
         border-bottom:1px solid var(--border); background:var(--panel);
         position:sticky; top:0; flex-wrap:wrap; }
header .brand { font-weight:700; color:var(--fg); }
header nav a { color:var(--dim); margin-right:.9rem; }
header nav a.on { color:var(--fg); border-bottom:2px solid var(--blue); }
header .right { margin-left:auto; color:var(--dim); font-size:12px; }
main { padding:1.2rem; max-width:1200px; margin:0 auto; }
.card { background:var(--panel); border:1px solid var(--border); border-radius:8px;
        padding:1rem 1.2rem; margin-bottom:1.2rem; overflow-x:auto; }
.card h2 { margin:.1rem 0 .6rem; font-size:16px; }
.card h3 { margin:.9rem 0 .35rem; font-size:13px; color:var(--dim);
           text-transform:uppercase; letter-spacing:.05em; }
table { border-collapse:collapse; width:100%; }
th,td { text-align:left; padding:.28rem .6rem .28rem 0; vertical-align:top; }
th { color:var(--dim); font-weight:600; font-size:12px; }
tr + tr td { border-top:1px solid #21262d; }
.b { display:inline-block; padding:.05rem .5rem; border-radius:999px; font-size:12px;
     border:1px solid var(--border); white-space:nowrap; }
.b.ok      { color:var(--green); border-color:var(--green); }
.b.bad     { color:var(--red);   border-color:var(--red); }
.b.warn    { color:var(--amber); border-color:var(--amber); }
.b.unknown { color:var(--dim); }
.b.design  { color:var(--purple); border-color:var(--purple); }
.dim { color:var(--dim); } .small { font-size:12px; }
.note { color:var(--purple); font-size:12px; }
.md { font:15px/1.6 system-ui,-apple-system,Segoe UI,sans-serif; max-width:900px; }
.md pre { background:var(--bg); border:1px solid var(--border); border-radius:6px;
          padding:.7rem; overflow-x:auto; font-size:13px; }
.md code { background:var(--bg); padding:.1rem .3rem; border-radius:4px; font-size:13px; }
.md h1,.md h2 { border-bottom:1px solid var(--border); padding-bottom:.25rem; }
.md blockquote { border-left:3px solid var(--border); margin-left:0;
                 padding-left:1rem; color:var(--dim); }
.md table td,.md table th { border:1px solid var(--border); padding:.3rem .6rem; }
.refresh { float:right; font-size:12px; }
/* cross-repo search */
.searchbox { display:flex; gap:.4rem; margin:.4rem 0 .2rem; flex-wrap:wrap; }
.searchbox input { flex:1 1 260px; min-width:0; background:var(--bg); color:var(--fg);
     border:1px solid var(--border); border-radius:6px; padding:.4rem .6rem; font:inherit; }
.searchbox button { background:var(--panel); color:var(--fg); border:1px solid var(--border);
     border-radius:6px; padding:.4rem .9rem; font:inherit; cursor:pointer; }
.searchbox button:hover { border-color:var(--blue); color:var(--blue); }
header .searchbox { margin:0; flex:1 1 220px; max-width:340px; }
header .searchbox input { padding:.25rem .5rem; }
header .searchbox button { padding:.25rem .6rem; }
.snippet { margin-top:.25rem; color:var(--fg); line-height:1.5; word-break:break-word; }
/* cross-repo activity timeline + idea backlog */
.b.repo { color:var(--blue); border-color:var(--blue); }
.tl td { padding:.45rem .6rem .45rem 0; }
.tl .when { color:var(--dim); font-size:12px; white-space:nowrap; }
.tl .who { color:var(--dim); font-size:12px; }
.banner { color:var(--amber); border:1px solid var(--amber); border-radius:6px;
          padding:.4rem .7rem; margin:.3rem 0 .6rem; font-size:12px; }
.idea-title { font-weight:600; }
.idea-sum { color:var(--dim); font-size:12px; margin-top:.15rem; line-height:1.5;
            word-break:break-word; }
.idea-row + .idea-row { border-top:1px solid #21262d; padding-top:.5rem; margin-top:.5rem; }
mark { background:rgba(210,153,34,.35); color:var(--fg); border-radius:3px; padding:0 .1rem; }

/* --- mobile polish: tablet/phone (owner browses at ~375px) --- */
@media (max-width: 640px) {
  header { padding:.55rem .8rem; gap:.45rem .9rem; }
  header .brand { flex-basis:100%; }
  header .right { margin-left:0; flex-basis:100%; }
  header .searchbox { max-width:none; flex-basis:100%; order:3; }
  main { padding:.8rem; }
  .card { padding:.8rem; border-radius:6px; }
  .card h2 { font-size:15px; }
  /* wide tables scroll inside their card rather than squashing/overflowing */
  .card table { min-width:520px; }
  .card .searchbox, .card .searchbox input { min-width:0; }
  .md { font-size:14px; max-width:100%; }
  .md table { min-width:480px; }
  /* tap-friendly targets */
  header nav a { display:inline-block; padding:.25rem 0; }
  .searchbox input, .searchbox button { min-height:2.2rem; }
  .refresh { float:none; display:block; margin-top:.3rem; }
}
</style>
</head>
<body>
<header>
  <span class="brand">superbot control plane</span>
  <nav>
    <a href="/" class="{{ 'on' if active == 'board' else '' }}">readiness board</a>
    <a href="/fleet" class="{{ 'on' if active == 'fleet' else '' }}">fleet</a>
    <a href="/activity" class="{{ 'on' if active == 'activity' else '' }}">activity</a>
    <a href="/ideas" class="{{ 'on' if active == 'ideas' else '' }}">ideas</a>
    <a href="/journal" class="{{ 'on' if active == 'journal' else '' }}">journal browser</a>
  </nav>
  <form class="searchbox" action="/journal/search" method="get" role="search">
    <input type="search" name="q" placeholder="search journal…" aria-label="search journal across repos">
    <button type="submit">go</button>
  </form>
  <span class="right">{% block headright %}{% endblock %}</span>
</header>
<main>{% block content %}{% endblock %}</main>
</body>
</html>
